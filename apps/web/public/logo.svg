<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="48" height="48" rx="13" fill="url(#bg)"/>

  <!-- Subtle top-shine for depth -->
  <rect width="48" height="48" rx="13" fill="url(#shine)"/>

  <!-- Browser tab shape: notch at top-left, window body -->
  <!-- Tab notch -->
  <path d="M9 21 L9 16 C9 14.9 9.9 14 11 14 L19 14 L22 18 L37 18 C38.1 18 39 18.9 39 20 L39 36 C39 37.1 38.1 38 37 38 L11 38 C9.9 38 9 37.1 9 36 Z"
        fill="white" fill-opacity="0.15"/>

  <!-- Browser chrome bar -->
  <rect x="9" y="21" width="30" height="3" fill="white" fill-opacity="0.2"/>

  <!-- Navigation arrow — bold, centered in the browser body -->
  <!-- Shaft -->
  <line x1="16" y1="30" x2="27" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <path d="M23 26 L28 30 L23 34" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Sync indicator: two small dots representing synced participants -->
  <circle cx="32" cy="27" r="1.8" fill="white" fill-opacity="0.9"/>
  <circle cx="37" cy="27" r="1.8" fill="white" fill-opacity="0.5"/>
</svg>
