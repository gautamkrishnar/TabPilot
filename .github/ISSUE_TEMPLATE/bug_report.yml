name: Bug Report
description: Report a bug or unexpected behaviour in Tab Pilot
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible — the more context you provide, the faster we can diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Enter '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened instead?
      placeholder: Describe what actually occurred...
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser were you using when the bug occurred?
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Microsoft Edge
        - Other (describe in additional context)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which operating system were you running?
      options:
        - macOS
        - Windows
        - Linux
        - iOS / iPadOS
        - Android
        - Other
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version (if self-hosting)
      description: Run `node --version` and paste the output here. Leave blank if using the container image.
      placeholder: "e.g. v22.3.0"
    validations:
      required: false

  - type: input
    id: tabpilot_version
    attributes:
      label: Tab Pilot version / commit
      description: Which version or Git commit SHA are you running?
      placeholder: "e.g. v1.0.0 or commit abc1234"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any browser console errors, API logs, or container logs here. This field is collapsed by default.
      placeholder: |
        Paste logs here...
        (Browser console: F12 → Console tab)
        (Container logs: podman compose logs app)
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, network traces, related issues, deployment configuration, etc.
      placeholder: Add any other context about the problem here...
    validations:
      required: false
